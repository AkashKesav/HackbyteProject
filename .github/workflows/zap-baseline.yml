name: ZAP Baseline

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Public URL to scan with ZAP"
        required: false
        type: string
  schedule:
    - cron: "15 5 * * 6"

permissions:
  contents: read

jobs:
  zap-baseline:
    name: Baseline web scan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ZAP_TARGET_URL != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve target URL
        id: target
        shell: bash
        run: |
          TARGET="${{ inputs.target_url }}"
          if [ -z "$TARGET" ]; then
            TARGET="${{ vars.ZAP_TARGET_URL }}"
          fi
          if [ -z "$TARGET" ]; then
            echo "No target URL provided. Set workflow input target_url or repository variable ZAP_TARGET_URL."
            exit 1
          fi
          echo "url=$TARGET" >> "$GITHUB_OUTPUT"

      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ steps.target.outputs.url }}
          cmd_options: "-a"
